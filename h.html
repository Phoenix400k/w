<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل ماي سيما</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .video-container { width: 100%; height: 100%; }
        /* تنسيق أزرار التخطي (Skip Buttons) */
        .skip-btn {
            position: absolute; top: 50%; transform: translateY(-50%);
            z-index: 10; cursor: pointer; color: #fff;
            display: none; transition: opacity 0.3s;
        }
        .skip-btn.show { display: block; }
        .skip-btn.left { left: 20px; }
        .skip-btn.right { right: 20px; }
        .icon-bg svg { width: 40px; fill: #fff; }
    </style>
</head>
<body bis_status="ok">

    <div id="sprite-plyr" hidden>
        <svg xmlns="http://www.w3.org/2000/svg">
            <symbol id="plyr-play" viewBox="0 0 18 18"><path d="M15.562 8.1L3.87.225c-.818-.562-1.87 0-1.87.9v15.75c0 .9 1.052 1.462 1.87.9L15.563 9.9c.584-.45.584-1.35 0-1.8z"></path></symbol>
            </svg>
    </div>

    <div id="loading-message" style="color:white; position:absolute;">انتظر، جاري التحميل...</div>

    <div id="video-wrapper" class="video-container">
        <video id="player" playsinline preload="auto">
            <source src="https://link.mycima.cv/52f35e95258c4e9b2503e6226630e28d" type="video/mp4">
        </video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const video = document.getElementById('player');
        
        // تشغيل مكتبة Plyr بنفس إعداداتهم
        const player = new Plyr(video, {
            ratio: '16:9',
            fullscreen: { enabled: true, fallback: true },
            controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'volume', 'settings', 'fullscreen'],
            settings: ['quality', 'speed']
        });

        player.on('ready', () => {
            document.getElementById('loading-message').style.display = 'none';
        });

        // تفعيل أزرار التقديم والتأخير 10 ثواني عند الضغط
        player.on('play', () => {
            // هنا يمكنك إضافة أكشن إضافي إذا أردت
        });
    </script>
</body>
</html>
