<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل الفيديو المباشر</title>
    <style>
        /* تصميم الصفحة لتكون سوداء بالكامل والمشغل في المنتصف */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: sans-serif;
        }

        .video-container {
            width: 100%;
            max-width: 1000px; /* يمكنك تكبير أو تصغير العرض من هنا */
            height: 80vh; /* طول المشغل 80% من مساحة الشاشة */
            background: #111;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 10px;
        }

        .info-text {
            color: #555;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe 
            src="https://mycima-my.com/?secure_stream=eJzLKCkpKLbS18_JzMvWy61MzsxN1Esu0zc1SjM2TbU0NTK1SDZJtUwyMjUwTjUzMjIzMzZINbJIAQD3fRBn.2a04c6c48ce854b5" 
            allowfullscreen="true" 
            webkitallowfullscreen="true" 
            mozallowfullscreen="true" 
            allow="autoplay; fullscreen; picture-in-picture">
        </iframe>
    </div>

    <div class="info-text">
        جاري عرض الفيديو من السيرفر المباشر...
    </div>

</body>
</html>
