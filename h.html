<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل فيديو مرتب</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #1a1a1a; /* لون خلفية مريح للعين */
            display: flex; justify-content: center; align-items: center;
            font-family: sans-serif;
        }

        /* هنا السر: حددنا مقاس الحاوية */
        .video-container { 
            width: 90%;          /* العرض على الجوال */
            max-width: 800px;    /* أقصى عرض على الكمبيوتر */
            border-radius: 12px; /* زوايا منحنية عشان الشكل */
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* ظل للفيديو */
            background: #000;
        }

        /* تنسيق رسالة التحميل */
        #loading-message {
            color: #fff;
            font-size: 14px;
            position: absolute;
            z-index: 5;
        }
    </style>
</head>
<body>

    <div id="loading-message">جاري تجهيز المشغل...</div>

    <div class="video-container" id="video-wrapper" style="display: none;">
        <video id="player" playsinline preload="auto">
            <source src="https://link.mycima.cv/52f35e95258c4e9b2503e6226630e28d" type="video/mp4">
        </video>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script>
        const video = document.getElementById('player');
        
        // إعدادات المشغل
        const player = new Plyr(video, {
            ratio: '16:9',
            fullscreen: { enabled: true, fallback: true, iosNative: true },
            controls: [
                'play-large', 
                'play', 
                'progress', 
                'current-time', 
                'mute', 
                'volume', 
                'settings', 
                'fullscreen' // زر التكبير موجود هنا
            ],
            settings: ['quality', 'speed'],
            tooltips: { controls: true, seek: true }
        });

        // إظهار المشغل بعد الجاهزية
        player.on('ready', () => {
            document.getElementById('loading-message').style.display = 'none';
            document.getElementById('video-wrapper').style.display = 'block';
        });
    </script>
</body>
</html>
